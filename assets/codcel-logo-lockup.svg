<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200" fill="none">
  <title>Codcel logo</title>
  <defs>
    <linearGradient id="codcel-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <g id="mark" transform="translate(10,10)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="180" height="180" rx="28" stroke="currentColor" stroke-opacity=".18"/>
    <rect x="16" y="16" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <rect x="64" y="16" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <rect x="16" y="64" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <rect x="64" y="64" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <rect x="16" y="112" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <rect x="64" y="112" width="38" height="38" rx="8" fill="currentColor" fill-opacity=".14"/>
    <path d="M110 52 L152 90 L110 128" stroke="url(#codcel-grad)" stroke-width="16"/>
  </g>
  <g id="wordmark" transform="translate(220, 40)">
    <!-- Live text so it matches your site fonts (e.g., next/font Geist) -->
    <text x="0" y="0" font-size="112" font-weight="700" dominant-baseline="hanging"
          fill="currentColor"
          style="font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; letter-spacing: -0.02em;">
      codcel
    </text>
    <!-- Accent underline to echo the gradient in the mark -->
    <rect x="6" y="128" width="330" height="8" rx="4" fill="url(#codcel-grad)"/>
  </g>
  <style><![CDATA[
    :root, svg { color: #0f172a; } /* slate-900 */
  ]]></style>
</svg>
